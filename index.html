<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AMS Green Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070707;--s1:#0e0e0e;--s2:#161616;--s3:#1e1e1e;
  --b1:#202020;--b2:#2c2c2c;--b3:#3e3e3e;
  --G:#4eff38;--Gd:#091e08;--Gb:#154012;
  --A:#f5c342;--Ad:#1c1406;--Ab:#3a2806;
  --B:#c8906a;--Bd:#1a1008;--Bb:#3a2008;
  --BL:#48b4ff;--BLd:#071828;
  --P:#b794f4;--R:#ff4f4f;--T:#e8c84a;
  --t:#f5f2ee;--m1:#b0aca4;--m2:#888480;--m3:#242424;
  --r:10px;--r2:7px;--r3:20px;
}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--t);display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* ── NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:500;background:rgba(7,7,7,.97);backdrop-filter:blur(24px);border-top:1px solid var(--b1);display:flex;padding:5px 0 13px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border:none;background:none;cursor:pointer;color:var(--m2);transition:color .18s}
.nb .ic{font-size:22px;line-height:1;transition:transform .15s}
.nb .lb{font-family:'Kanit',sans-serif;font-size:12px;letter-spacing:.04em}
.nb.ag{color:var(--G)}.nb.ag .ic{transform:translateY(-2px)}
.nb.aa{color:var(--A)}.nb.aa .ic{transform:translateY(-2px)}
.nb.abl{color:var(--BL)}.nb.abl .ic{transform:translateY(-2px)}

/* ── PAGES ── */
.page{display:none;height:calc(100vh - 58px);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.page.on{display:block}

/* ── HERO ── */
.hero{padding:.8rem .75rem .1rem;text-align:center}
.hl{font-size:11px;letter-spacing:.3em;color:var(--m1);text-transform:uppercase;font-family:'Kanit',sans-serif;margin-bottom:.1rem}
.ht{font-size:clamp(1.7rem,8vw,2.5rem);font-weight:700;line-height:1;font-family:'Chakra Petch',sans-serif}
.ht-g{background:linear-gradient(130deg,var(--G),#9affb0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ht-a{background:linear-gradient(130deg,var(--A),#ffe070);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── STATS ── */
.ss{display:flex;gap:4px;padding:.25rem .75rem .15rem;overflow-x:auto;scrollbar-width:none}
.ss::-webkit-scrollbar{display:none}
.sp{background:var(--s2);border:1px solid var(--b1);border-radius:99px;padding:.25rem .7rem;white-space:nowrap;display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.sn{font-family:'Kanit',sans-serif;font-size:15px;font-weight:600}
.sl{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m1)}

/* ── RATIO BAR ── */
.rbar{margin:.12rem .75rem .04rem;height:4px;background:var(--m3);border-radius:99px;overflow:hidden;display:flex}
.rb-s{background:var(--A);transition:width .4s}
.rb-h{background:#5ee8b2}
.rb-i{background:var(--P);flex:1}
.rlbl{display:flex;justify-content:space-between;padding:0 .75rem;margin-bottom:.22rem}
.rl{font-family:'Kanit',sans-serif;font-size:11px;color:var(--m2)}

/* ── SEARCH ── */
.sb{display:flex;align-items:center;gap:.3rem;background:var(--s2);border:1px solid var(--b1);border-radius:99px;padding:.4rem .75rem;margin:.25rem .75rem .2rem}
.sb input{flex:1;font-family:'Kanit',sans-serif;font-size:14px;background:transparent;border:none;color:var(--t);outline:none}
.sb input::placeholder{color:var(--m2)}
.sb-ico{color:var(--m2);font-size:16px;flex-shrink:0}
.sb-clr{display:none;color:var(--m2);font-size:10px;cursor:pointer;flex-shrink:0;padding:0 2px}

/* ── FILTER CHIPS ── */
.frow{padding:0 .75rem .22rem;overflow-x:auto;scrollbar-width:none;display:flex;gap:3px}
.frow::-webkit-scrollbar{display:none}
.fc{font-family:'Kanit',sans-serif;font-size:12px;padding:6px 13px;border-radius:99px;border:1px solid var(--b2);background:transparent;color:var(--m1);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.fc.on{border-color:var(--Gb);background:var(--Gd);color:var(--G)}
.fc.on-a{border-color:var(--Ab);background:var(--Ad);color:var(--A)}
.fc.on-b{border-color:var(--Bb);background:var(--Bd);color:var(--B)}
.fc.on-p{border-color:#3a2868;background:#120a28;color:var(--P)}

/* ── THC SLIDER ── */
.sfilt{display:flex;align-items:center;gap:.4rem;padding:.02rem .75rem .2rem}
.sfilt-l{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m2);white-space:nowrap;flex-shrink:0}
.sfilt-s{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--b2);border-radius:99px;outline:none;cursor:pointer}
.sfilt-s::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--A);cursor:pointer}
.sfilt-v{font-family:'Kanit',sans-serif;font-size:12px;color:var(--A);min-width:22px;text-align:right}

/* ── SECTION ── */
.sec{padding:0 .75rem;margin-bottom:.55rem}
.slbl{font-family:'Chakra Petch',sans-serif;font-size:11px;letter-spacing:.15em;color:var(--m2);text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:.35rem}
.slbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.slbl-c{color:var(--m2);font-size:11px;letter-spacing:0;margin-left:.12rem;text-transform:none}

/* ══════════════════════════════════════
   ITEM ROWS — stilizzate per personalità
══════════════════════════════════════ */
.ir{display:grid;grid-template-columns:28px minmax(0,1fr) auto auto 36px;align-items:center;gap:.35rem;padding:.45rem .4rem .45rem .5rem;border-radius:var(--r2);margin-bottom:.25rem;cursor:pointer;user-select:none;-webkit-user-select:none;transition:opacity .12s;position:relative;overflow:hidden;border:1px solid transparent}
.ir:active{opacity:.82}

/* default */
.ir-default{background:var(--s2);border-color:var(--b1)}
.ir-default:hover{border-color:var(--b2)}

/* sativa — verde-giallo caldo */
.ir-sativa{background:linear-gradient(100deg,#0e1a0a,#121a08);border-color:#1a3010}
.ir-sativa:hover{border-color:#254018}
.ir-sativa .inm{color:#c8e88a}

/* indica — viola profondo */
.ir-indica{background:linear-gradient(100deg,#0e0a1a,#120a1e);border-color:#281060}
.ir-indica:hover{border-color:#3a1880}
.ir-indica .inm{color:#c4a0f4}

/* hybrid — teal-verde */
.ir-hybrid{background:linear-gradient(100deg,#081814,#0a1e18);border-color:#103828}
.ir-hybrid:hover{border-color:#185040}
.ir-hybrid .inm{color:#80e0c0}

/* fruity — arancio-pesca */
.ir-fruity{background:linear-gradient(100deg,#1a0e08,#1e1008);border-color:#402010}
.ir-fruity:hover{border-color:#582c18}
.ir-fruity .inm{color:#f0a060}

/* haze — azzurro-celeste */
.ir-haze{background:linear-gradient(100deg,#080e1a,#08101e);border-color:#0e2040}
.ir-haze:hover{border-color:#183060}
.ir-haze .inm{color:#80c0f8}

/* hash marocchino — sabbia-oro */
.ir-hash-mar{background:linear-gradient(100deg,#1a1208,#1e1608);border-color:#402808}
.ir-hash-mar:hover{border-color:#583810}
.ir-hash-mar .inm{color:#e0b060}

/* hash orientale — terracotta */
.ir-hash-ori{background:linear-gradient(100deg,#1a0c08,#1e1008);border-color:#3a1808}
.ir-hash-ori:hover{border-color:#502010}
.ir-hash-ori .inm{color:#d08050}

/* hash moderno — grigio platino */
.ir-hash-mod{background:linear-gradient(100deg,#101214,#0e1016);border-color:#202428}
.ir-hash-mod:hover{border-color:#303438}
.ir-hash-mod .inm{color:#b0c0d0}

/* potenti — rosso scuro */
.ir-potente{background:linear-gradient(100deg,#180808,#1c0808);border-color:#400808}
.ir-potente:hover{border-color:#581010}
.ir-potente .inm{color:#f08080}

/* done state */
.ir.done{opacity:.6}
.ir.done .inm{text-decoration:line-through}
.ir.hdone{opacity:.6}
.ir.hdone .inm{text-decoration:line-through}
.ir.strd .inm::after{content:' ★';color:var(--A);font-size:9px}

/* check circle */
.cc{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;line-height:1;position:relative;z-index:1}
.done .cc{opacity:.4}
.hdone .cc{opacity:.4}
.cc svg{display:none}


/* text */
.inm{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Chakra Petch',sans-serif;letter-spacing:.01em;min-width:0;position:relative;z-index:1}
.itags{display:flex;gap:2px;flex-shrink:0;overflow:hidden;position:relative;z-index:1}
.itag{font-family:'Kanit',sans-serif;font-size:10px;padding:3px 8px;border-radius:99px;border:1px solid;white-space:nowrap;flex-shrink:0}
.ts{color:var(--A);border-color:#2a1e06;background:#100a02}
.ti{color:var(--P);border-color:#220e52;background:#0e0828}
.th{color:#5ee8b2;border-color:#083020;background:#04180e}
.tf{color:#fb923c;border-color:#381206;background:#160802}
.tz{color:var(--BL);border-color:#081e38;background:#040c18}
.tc{color:#888;border-color:#222;background:#0c0c0c}
.thh{color:var(--B);border-color:#361806;background:#160c02}
.tp{color:#f08080;border-color:#3a0808;background:#180404}
.irt{display:flex;flex-direction:column;align-items:flex-end;gap:0;flex-shrink:0;position:relative;z-index:1}
.ithc{font-family:'Kanit',sans-serif;font-size:11px;color:var(--m2);line-height:1.2}
.irat{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;line-height:1.2}
.iarr{font-size:9px;color:var(--m2);flex-shrink:0}

/* ══════════════════════════════════════
   SHOP CARDS — stilizzate per personalità
══════════════════════════════════════ */
.sc{display:flex;align-items:flex-start;gap:.4rem;padding:.55rem .6rem;border-radius:var(--r2);margin-bottom:.25rem;cursor:pointer;transition:opacity .12s;border:1px solid transparent;position:relative;overflow:hidden}
.sc:active{opacity:.85}

.sc-top{background:linear-gradient(110deg,#091809,#0b1a08);border-color:#154012}
.sc-top:hover{border-color:#1e5018}
.sc-top .sc-nm{color:#80e880}

.sc-hash{background:linear-gradient(110deg,#1a1008,#1e1208);border-color:var(--Bb)}
.sc-hash:hover{border-color:#503010}
.sc-hash .sc-nm{color:#e0a060}

.sc-chill{background:linear-gradient(110deg,#081018,#08121e);border-color:#0e2040}
.sc-chill:hover{border-color:#183060}
.sc-chill .sc-nm{color:#80b8f8}

.sc-local{background:linear-gradient(110deg,#161208,#1a160a);border-color:#382a08}
.sc-local:hover{border-color:#503a10}
.sc-local .sc-nm{color:#d0b060}

.sc-old{background:linear-gradient(110deg,#101010,#141414);border-color:#2a2a2a}
.sc-old:hover{border-color:#3a3a3a}
.sc-old .sc-nm{color:#b0b0b0}

.sc-warn{background:linear-gradient(110deg,#180808,#1c0a0a);border-color:#401010}
.sc-warn:hover{border-color:#581818}
.sc-warn .sc-nm{color:#f08080}

.sc-nm{font-size:16px;font-weight:700;margin-bottom:.06rem;font-family:'Chakra Petch',sans-serif;letter-spacing:.01em;line-height:1.2}
.sc-ar{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m2);margin-bottom:.1rem}
.sc-pv{font-family:'Kanit',sans-serif;font-size:12px;color:#c0bcb4;line-height:1.45;margin-bottom:.15rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-mt{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.sc-rt{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:700}
.sc-hr{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m2)}
.sbdg{font-family:'Kanit',sans-serif;font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid;align-self:start;white-space:nowrap}
.sb-top{color:var(--G);border-color:var(--Gb)}
.sb-hash{color:var(--B);border-color:var(--Bb)}
.sb-chill{color:var(--BL);border-color:#082038}
.sb-local{color:var(--A);border-color:var(--Ab)}
.sb-old{color:#a0a0a0;border-color:#3a3a3a}
.sb-warn{color:var(--R);border-color:#3a0a0a}

/* ══════════════════════════════════════
   WISHLIST CARDS — stilizzate + rimozione
══════════════════════════════════════ */
.wcard{border-radius:var(--r2);margin-bottom:.28rem;border:1px solid transparent;overflow:hidden;position:relative}
.wcard-inner{display:grid;grid-template-columns:minmax(0,1fr) 44px;align-items:stretch}
.wcard-main{display:flex;align-items:center;gap:.5rem;padding:.5rem .6rem;cursor:pointer;min-width:0}
.wcard-rm{display:flex;align-items:center;justify-content:center;background:rgba(255,80,80,.12);border-left:1px solid rgba(255,80,80,.2);color:var(--R);font-size:18px;cursor:pointer;transition:background .15s;flex-shrink:0;min-width:44px}
.wcard-rm:hover{background:rgba(255,80,80,.25)}
.wcard-rm:active{background:rgba(255,80,80,.4)}

/* wishlist card types */
.wc-weed{background:linear-gradient(110deg,#0a1408,#0c180a);border-color:#1a3010}
.wc-hash{background:linear-gradient(110deg,#1a1008,#1e1208);border-color:var(--Bb)}
.wc-shop{background:linear-gradient(110deg,#0a0e14,#0c1018);border-color:#183050}
.wc-shop .wcard-nm{color:#80b8f8}
.wc-weed .wcard-nm{color:#90d870}
.wc-hash .wcard-nm{color:#d09050}
.wcard-nm{font-size:15px;font-weight:700;font-family:'Chakra Petch',sans-serif;letter-spacing:.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.wcard-sub{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.wcard-r{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:700;flex-shrink:0}
.wcard-done{opacity:.55}
.wcard-done .wcard-nm{text-decoration:line-through}

/* wish tabs */
.wtabs{display:flex;gap:3px;padding:0 .75rem .3rem}
.wtab{flex:1;font-family:'Kanit',sans-serif;font-size:13px;padding:.4rem;border-radius:99px;border:1px solid var(--b2);background:transparent;color:var(--m1);cursor:pointer;text-align:center;transition:all .15s}
.wtab.wt-g{border-color:var(--Gb);background:var(--Gd);color:var(--G)}
.wtab.wt-b{border-color:var(--Bb);background:var(--Bd);color:var(--B)}
.wtab.wt-bl{border-color:#183050;background:#0a1020;color:var(--BL)}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .18s}
.ov.show{opacity:1;pointer-events:all}
.pop{background:var(--s1);border-radius:var(--r3) var(--r3) 0 0;border-top:1px solid var(--b2);border-left:1px solid var(--b2);border-right:1px solid var(--b2);max-height:86vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 1rem 2rem;transform:translateY(16px);transition:transform .18s ease}
.ov.show .pop{transform:translateY(0)}
.pop-h{width:30px;height:3px;background:var(--b3);border-radius:99px;margin:8px auto .7rem}
.ph2{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.2rem}
.pn{font-size:1.4rem;font-weight:700;font-family:'Chakra Petch',sans-serif;line-height:1.2;flex:1;padding-right:.35rem}
.px{font-size:18px;color:var(--m1);cursor:pointer;background:none;border:none;line-height:1;padding:0;flex-shrink:0}
.psub{font-family:'Kanit',sans-serif;font-size:13px;color:var(--m1);margin-bottom:.3rem}
.par{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m2);padding:.2rem .5rem;background:var(--s2);border-radius:99px;display:inline-block;margin-bottom:.4rem}
.ptags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.45rem}
.ptag{font-family:'Kanit',sans-serif;font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid}
.pt-s{color:var(--A);border-color:#2a1e06;background:#0e0802}
.pt-i{color:var(--P);border-color:#220e52;background:#0e0828}
.pt-h{color:#5ee8b2;border-color:#083020;background:#04180e}
.pt-f{color:#fb923c;border-color:#381206;background:#160802}
.pt-z{color:var(--BL);border-color:#081e38;background:#040c18}
.pt-c{color:#888;border-color:#222;background:#0c0c0c}
.pt-hh{color:var(--B);border-color:#361806;background:#160c02}
.pt-p{color:#f08080;border-color:#3a0808;background:#180404}
.pdesc{font-family:'Kanit',sans-serif;font-size:13px;color:var(--m1);line-height:1.65;margin-bottom:.4rem}
.pdet{font-family:'Kanit',sans-serif;font-size:13px;color:#c0bcb4;line-height:1.65;margin-bottom:.55rem}
.pdiv{height:1px;background:var(--b1);margin:.45rem 0}
.plbl{font-family:'Kanit',sans-serif;font-size:11px;letter-spacing:.12em;color:var(--m2);text-transform:uppercase;margin-bottom:.25rem}
.rrow{display:flex;align-items:center;gap:.35rem;margin-bottom:.38rem}
.rsl{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--b2);border-radius:99px;outline:none;cursor:pointer}
.rsl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer}
.rsl.rg::-webkit-slider-thumb{background:var(--G)}
.rsl.rb::-webkit-slider-thumb{background:var(--B)}
.rsl.ra::-webkit-slider-thumb{background:var(--A)}
.rv{font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;min-width:27px;text-align:right}
.rv-g{color:var(--G)}.rv-b{color:var(--B)}.rv-a{color:var(--A)}
.ni{font-family:'Kanit',sans-serif;font-size:13px;background:var(--bg);border:1px solid var(--b2);color:var(--m1);border-radius:var(--r2);padding:5px 8px;width:100%;outline:none;resize:none;line-height:1.5;margin-bottom:.38rem}
.ni:focus{border-color:var(--b3);color:var(--t)}
.ni::placeholder{color:var(--m2)}
.pacts{display:flex;gap:.28rem;flex-wrap:wrap}
.pa{font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;padding:.45rem .5rem;border-radius:var(--r2);border:1px solid var(--b2);background:var(--s2);color:var(--m1);cursor:pointer;transition:all .15s;text-align:center;flex:1;min-width:80px}
.pa.pg{border-color:var(--Gb);background:var(--Gd);color:var(--G)}
.pa.pa2{border-color:var(--Ab);background:var(--Ad);color:var(--A)}
.pa.pb{border-color:var(--Bb);background:var(--Bd);color:var(--B)}
.pa.pr{border-color:#3a0a0a;background:#160606;color:var(--R)}
.pa.pbl{border-color:#183050;background:var(--BLd);color:var(--BL)}
.rlp{display:inline-flex;align-items:center;gap:.28rem;background:var(--s2);border:1px solid var(--b1);border-radius:99px;padding:.12rem .45rem;margin-bottom:.3rem}
.rlp-v{font-family:'Chakra Petch',sans-serif;font-size:15px;color:var(--A);font-weight:500}
.rlp-src{font-family:'Kanit',sans-serif;font-size:11px;color:var(--m2)}

/* SHOP POPUP */
.map-btn{display:flex;align-items:center;justify-content:center;gap:.25rem;width:100%;padding:.55rem;background:var(--BLd);border:1px solid #0c2438;border-radius:var(--r2);font-family:'Kanit',sans-serif;font-size:13px;color:var(--BL);text-decoration:none;margin-bottom:.25rem}
.srch-btn{display:flex;align-items:center;justify-content:center;gap:.25rem;width:100%;padding:.55rem;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);font-family:'Kanit',sans-serif;font-size:13px;color:var(--m1);margin-bottom:.2rem;cursor:pointer}
.sh-rr{display:flex;align-items:center;gap:.35rem;margin:.25rem 0}
.sh-rsl{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--b2);border-radius:99px;outline:none;cursor:pointer}
.sh-rsl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--A);cursor:pointer}
.sh-rv{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;color:var(--A);min-width:27px;text-align:right}
.spop-spec{font-family:'Kanit',sans-serif;font-size:13px;color:var(--m1);line-height:1.7;margin-bottom:.45rem}

/* GUIDA */
.ghero{background:linear-gradient(135deg,#091809,#050e05);border:1px solid var(--Gb);border-radius:var(--r3);padding:.7rem .85rem;margin:.28rem .75rem .45rem;position:relative;overflow:hidden}
.ghero::after{content:'';position:absolute;top:-35px;right:-35px;width:80px;height:80px;background:#4eff3810;border-radius:50%;filter:blur(20px)}
.gh-l{font-family:'Kanit',sans-serif;font-size:7px;letter-spacing:.3em;color:var(--G);text-transform:uppercase;margin-bottom:.15rem}
.gh-t{font-size:.85rem;font-weight:800;margin-bottom:.18rem}
.gh-b{font-family:'Kanit',sans-serif;font-size:9px;color:#5a8a5a;line-height:1.55}
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:.2rem;margin-bottom:.32rem}
.ri2{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:.38rem .48rem}
.ri2-n{font-family:'Kanit',sans-serif;font-size:12px;color:var(--m2);line-height:1;margin-bottom:.08rem}
.ri2-t{font-family:'Kanit',sans-serif;font-size:8.5px;color:var(--m1);line-height:1.5}
.ri2-t strong{color:var(--t);font-weight:500}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:.2rem;margin-bottom:.32rem}
.di{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:.38rem .48rem}
.di-l{font-family:'Kanit',sans-serif;font-size:7px;color:var(--m2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.06rem}
.di-n{font-size:10px;font-weight:700;margin-bottom:.06rem}
.di-d{font-family:'Kanit',sans-serif;font-size:10px;color:var(--G);font-weight:500}
.di-nt{font-family:'Kanit',sans-serif;font-size:8px;color:var(--m2);margin-top:.06rem;line-height:1.4}
.tit{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:.42rem .55rem;margin-bottom:.2rem}
.ti-q{font-size:10.5px;font-weight:700;margin-bottom:.1rem}
.ti-a{font-family:'Kanit',sans-serif;font-size:9px;color:var(--m1);line-height:1.6}
.ti-a strong{color:var(--t);font-weight:500}
.wbox{background:#100606;border:1px solid #3a0a0a;border-radius:var(--r2);padding:.42rem .55rem;margin-bottom:.32rem}
.wb-t{font-family:'Kanit',sans-serif;font-size:7px;letter-spacing:.2em;color:var(--R);text-transform:uppercase;margin-bottom:.1rem}
.wb-b{font-family:'Kanit',sans-serif;font-size:9px;color:#8a5050;line-height:1.6}
.gsect{font-size:.76rem;font-weight:700;display:flex;align-items:center;gap:.32rem;margin-bottom:.28rem}
.gsect::before{content:'';width:3px;height:10px;background:var(--G);border-radius:99px;display:block}

/* AI */
.aibox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin:0 .75rem .4rem}
.aim-w{padding:.42rem;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:.25rem;scrollbar-width:none}
.aim-w::-webkit-scrollbar{display:none}
.aim{padding:.38rem .55rem;border-radius:var(--r2);font-family:'Kanit',sans-serif;font-size:9.5px;line-height:1.6;max-width:93%}
.aim-u{background:var(--s3);border:1px solid var(--b2);color:var(--t);align-self:flex-end;border-radius:var(--r2) var(--r2) 3px var(--r2)}
.aim-a{background:#060e08;border:1px solid #102814;color:#62a868;align-self:flex-start;border-radius:3px var(--r2) var(--r2) var(--r2)}
.aim-a.ld{opacity:.5;font-style:italic}
.qbtns{display:flex;gap:3px;flex-wrap:wrap;padding:.25rem .42rem .1rem}
.qb{font-family:'Kanit',sans-serif;font-size:7.5px;padding:2px 6px;border-radius:99px;border:1px solid var(--b2);background:var(--s2);color:var(--m1);cursor:pointer;white-space:nowrap}
.qb:hover{border-color:var(--G);color:var(--G)}
.airow{display:flex;gap:.28rem;padding:.32rem .42rem;border-top:1px solid var(--b1)}
.aiin{flex:1;font-family:'Kanit',sans-serif;font-size:10px;background:transparent;border:none;color:var(--t);outline:none}
.aiin::placeholder{color:var(--m2)}
.aisend{font-family:'Kanit',sans-serif;font-size:8.5px;background:var(--Gd);border:1px solid var(--Gb);color:var(--G);border-radius:6px;padding:.16rem .45rem;cursor:pointer;white-space:nowrap}
.aisend:disabled{opacity:.4;cursor:not-allowed}

.empty-st{text-align:center;padding:2rem 1rem;font-family:'Kanit',sans-serif;font-size:14px;color:var(--m2);line-height:1.7}
.no-res{display:none;text-align:center;padding:1rem;font-family:'Kanit',sans-serif;font-size:13px;color:var(--m2)}
.pb10{height:90px}
.grams-inp{font-family:'Kanit',sans-serif;font-size:11px;background:var(--bg);border:1px solid var(--b2);border-radius:var(--r2);padding:3px 7px;width:56px;text-align:center;outline:none;text-align:center}
.grams-inp:focus{border-color:var(--b3)}

.type-toggle{display:flex;gap:6px;padding:.25rem .75rem .15rem}
.tt{flex:1;font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:600;padding:.5rem .6rem;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--m1);cursor:pointer;transition:all .18s;text-align:center;-webkit-tap-highlight-color:transparent}
.tt-weed.active{background:var(--Gd);border-color:var(--Gb);color:var(--G)}
.tt-hash.active{background:var(--Bd);border-color:var(--Bb);color:var(--B)}
.istar{background:none;border:none;font-size:22px;color:var(--m2);cursor:pointer;padding:0;flex-shrink:0;line-height:1;transition:color .15s;width:36px;height:36px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.istar.on{color:var(--A)}
.sh-star{background:none;border:none;font-size:24px;color:var(--m2);cursor:pointer;padding:0;line-height:1;transition:color .15s;width:40px;height:40px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.sh-star.on{color:var(--A)}
.sc-visited .sc-nm::after{content:' ✓';color:var(--G);font-size:11px}
.sc-visited{opacity:.65}
.ir{position:relative;overflow:hidden}
.ir::before{content:attr(data-ico);position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:46px;opacity:.07;line-height:1;pointer-events:none;z-index:0}
.ir-sativa::after,.ir-indica::after,.ir-hybrid::after,.ir-fruity::after,.ir-haze::after,.ir-hash-mar::after,.ir-hash-ori::after,.ir-hash-mod::after,.ir-potente::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.ir-sativa::after{background:radial-gradient(ellipse at 0% 50%,rgba(120,220,60,.07),transparent 70%)}
.ir-indica::after{background:radial-gradient(ellipse at 0% 50%,rgba(140,80,240,.08),transparent 70%)}
.ir-hybrid::after{background:radial-gradient(ellipse at 0% 50%,rgba(60,200,160,.07),transparent 70%)}
.ir-fruity::after{background:radial-gradient(ellipse at 0% 50%,rgba(240,130,60,.08),transparent 70%)}
.ir-haze::after{background:radial-gradient(ellipse at 0% 50%,rgba(60,160,255,.08),transparent 70%)}
.ir-hash-mar::after{background:radial-gradient(ellipse at 0% 50%,rgba(220,160,60,.07),transparent 70%)}
.ir-hash-ori::after{background:radial-gradient(ellipse at 0% 50%,rgba(200,100,60,.08),transparent 70%)}
.ir-hash-mod::after{background:radial-gradient(ellipse at 0% 50%,rgba(140,180,210,.06),transparent 70%)}
.ir-potente::after{background:radial-gradient(ellipse at 0% 50%,rgba(255,60,60,.09),transparent 70%)}
.wcs{position:relative;overflow:hidden}
.wcs::before{content:attr(data-ico);position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:44px;opacity:.07;line-height:1;pointer-events:none}
.wcs.ir-sativa{background:linear-gradient(110deg,#0e1a0a,#121a08);border-color:#1a3010}.wcs.ir-sativa .wcard-nm{color:#c8e88a}
.wcs.ir-indica{background:linear-gradient(110deg,#0e0a1a,#120a1e);border-color:#281060}.wcs.ir-indica .wcard-nm{color:#c4a0f4}
.wcs.ir-hybrid{background:linear-gradient(110deg,#081814,#0a1e18);border-color:#103828}.wcs.ir-hybrid .wcard-nm{color:#80e0c0}
.wcs.ir-fruity{background:linear-gradient(110deg,#1a0e08,#1e1008);border-color:#402010}.wcs.ir-fruity .wcard-nm{color:#f0a060}
.wcs.ir-haze{background:linear-gradient(110deg,#080e1a,#08101e);border-color:#0e2040}.wcs.ir-haze .wcard-nm{color:#80c0f8}
.wcs.ir-hash-mar{background:linear-gradient(110deg,#1a1208,#1e1608);border-color:#402808}.wcs.ir-hash-mar .wcard-nm{color:#e0b060}
.wcs.ir-hash-ori{background:linear-gradient(110deg,#1a0c08,#1e1008);border-color:#3a1808}.wcs.ir-hash-ori .wcard-nm{color:#d08050}
.wcs.ir-hash-mod{background:linear-gradient(110deg,#101214,#0e1016);border-color:#202428}.wcs.ir-hash-mod .wcard-nm{color:#b0c0d0}
.wcs.ir-potente{background:linear-gradient(110deg,#180808,#1c0808);border-color:#400808}.wcs.ir-potente .wcard-nm{color:#f08080}
.wcs.ir-default{background:var(--s2);border-color:var(--b1)}.wcs.ir-default .wcard-nm{color:var(--t)}
.wcard-done{opacity:.5}.wcard-done .wcard-nm{text-decoration:line-through}

<script>
const ALL=[
// ─── MUST TRY: CLASSICI ────────────────────────────────────────────────────
{id:'white-widow',name:'White Widow',cat:'Must Try — I Classici',type:'weed',style:'ir-sativa',tags:['hybrid','classic'],thc:'~20%',thcN:20,rd:9.2,aroma:'Terroso, legnoso, dolce, resina',desc:'Ibrida olandese anni \'90 da Shantibaba — simbolo assoluto dei coffeeshop. Boccioli ricoperti di cristalli bianchi di resina. Ancora oggi il ceppo più riconoscibile al mondo.',det:'Effetto: euforia esplosiva 5-10 min, poi creatività sostenuta per ore. Non sedativa — ottima per musei, bici, conversazioni. Stone bilanciato, durata 2-3h.'},
{id:'og-kush',name:'OG Kush',cat:'Must Try — I Classici',type:'weed',style:'ir-indica',tags:['indica','classic'],thc:'~23%',thcN:23,rd:9.1,aroma:'Pino, limone, diesel, terra',desc:'Indica dominante cult da Hindu Kush afghano e Chemdawg. Tra le più imitate — l\'originale nei top shop è un\'altra storia. Resinosa, densa, potente.',det:'Effetto: inizia cerebrale ed euforico, poi scende pesante e caldo sul corpo. Per la sera. Hunger attack garantito. Non adatta come prima esperienza.'},
{id:'amnesia-haze',name:'Amnesia Haze',cat:'Must Try — I Classici',type:'weed',style:'ir-haze',tags:['sativa','haze','classic'],thc:'~22%',thcN:22,rd:9.4,aroma:'Citrus, limone, speziato, floreale',desc:'Sativa pura da Haze, Hawaiian e South Asian genetics. Vince Cannabis Cup Amsterdam quasi ogni anno. LA bandiera dei coffeeshop olandesi.',det:'Effetto: cerebrale potentissimo, espansivo, quasi psichedelico. Euforia lunga e intensa, memoria a breve in pausa. Dura 2-3h. Per esperti.'},
{id:'super-silver-haze',name:'Super Silver Haze',cat:'Must Try — I Classici',type:'weed',style:'ir-haze',tags:['sativa','haze','classic'],thc:'~21%',thcN:21,rd:9.0,aroma:'Speziato, erbaceo, limone, pino',desc:'Sativa da NL#1, Skunk#1 e Haze originale. 3 Cannabis Cup consecutive 1997-1999 — record imbattuto. Energizzante per eccellenza dei coffeeshop olandesi.',det:'Effetto: uplifting progressivo, body buzz vibrante. Mattina-pomeriggio, Van Gogh Museum, bici. Prima scelta dei locali per uso diurno. Lunga durata.'},
{id:'jack-herer',name:'Jack Herer',cat:'Must Try — I Classici',type:'weed',style:'ir-sativa',tags:['sativa','classic'],thc:'~18%',thcN:18,rd:8.8,aroma:'Pino, spezie, resina, legno',desc:'Sativa da Sensi Seeds, dedicata all\'attivista Jack Herer. 11+ Cannabis Cup wins. Ancora coltivata in forma originale — è un\'istituzione di Amsterdam.',det:'Effetto: cerebrale chiaro, focalizzato, speziato al palato. THC moderato per restare produttivi. Tra i più amati dagli olandesi per uso quotidiano.'},
{id:'northern-lights',name:'Northern Lights',cat:'Must Try — I Classici',type:'weed',style:'ir-indica',tags:['indica','classic'],thc:'~18%',thcN:18,rd:8.7,aroma:'Dolce, terroso, pino, muffa dolce',desc:'Indica pura afghana portata in Olanda nel 1985. Tra le più stabili geneticamente. Base di centinaia di varietà moderne.',det:'Effetto: rilassamento fisico profondo, euforia dolce e calmante, mente leggera. Ottima sera tardi e per dormire. Stone classico senza sorprese.'},
{id:'skunk-1',name:'Skunk #1',cat:'Must Try — I Classici',type:'weed',style:'ir-hybrid',tags:['hybrid','classic'],thc:'~16%',thcN:16,rd:8.3,aroma:'Pungente, terroso, fruttato, erbaceo',desc:'Ibrida storica del 1978 da Sam the Skunkman — madre genetica di centinaia di varietà. Odore inconfondibile. La madre della scena olandese.',det:'Effetto: bilanciato e accessibile. Euforia allegra, body relaxation progressivo. Ottima per effetto classico autentico. Porta diretta alla scena old school.'},
{id:'cheese',name:'Cheese',cat:'Must Try — I Classici',type:'weed',style:'ir-hybrid',tags:['hybrid','classic'],thc:'~18%',thcN:18,rd:8.5,aroma:'Formaggio stagionato, fruttato, terroso',desc:'Ibrida UK nata da mutazione di Skunk #1 anni \'90. Aroma pungente di formaggio invecchiato — divisivo ma iconico. Generazioni di fan devoti.',det:'Effetto: euforico e rilassante in parallelo. Stone bilanciato ottimo per sera. O la ami o non la sopporti — ma va provata almeno una volta.'},
{id:'ak47',name:'AK-47',cat:'Must Try — I Classici',type:'weed',style:'ir-hybrid',tags:['hybrid','classic'],thc:'~20%',thcN:20,rd:8.6,aroma:'Dolce, floreale, terroso, legno',desc:'Ibrida da Colombia, Mexico, Thailand e Afghanistan. 16+ Cannabis Cup. Il nome contrasta con l\'effetto rilassante e pacifico. Una delle più premiate della storia.',det:'Effetto: stone stabile e lungo, cerebrale iniziale poi fisico. Ottima per serate tranquille. Produce fumo denso e persistente. Molto fumosa.'},
{id:'critical-mass',name:'Critical Mass',cat:'Must Try — I Classici',type:'weed',style:'ir-indica',tags:['indica','classic'],thc:'~19%',thcN:19,rd:8.4,aroma:'Dolce, mela, erbaceo, terroso',desc:'Indica da Afghani e Skunk #1. Boccioli così pesanti che i rami si piegano — da cui il nome. Tra le più produttive. Coltivata in Olanda da decenni.',det:'Effetto: rilassamento fisico progressivo e profondo, euforia dolce. Ottima per sera. Non sopraffacente — perfetta per chi cerca indica senza overdrive.'},
{id:'kali-mist',name:'Kali Mist',cat:'Must Try — I Classici',type:'weed',style:'ir-sativa',tags:['sativa','classic'],thc:'~18%',thcN:18,rd:8.5,aroma:'Erbaceo dolce, speziato, legno',desc:'Sativa pura da Serious Seeds — Cannabis Cup winner 1995. Ceppo thai/vietnamese con effetto cerebrale molto pronunciato. Ricercata dagli intenditori.',det:'Effetto: cerebrale espansivo, euforia quasi meditativa. Lunga durata. Ottima per sessioni creative o passeggiate nei canali. Non adatta a neofiti.'},
{id:'haze-original',name:'Original Haze',cat:'Must Try — I Classici',type:'weed',style:'ir-haze',tags:['sativa','haze','classic'],thc:'~17%',thcN:17,rd:8.7,aroma:'Speziato terroso, agrume, legno, incenso',desc:'La madre di tutti le haze — ceppo originale californiano degli anni \'60 arrivato in Olanda. L\'aroma di spezie e incenso è unico nel panorama cannabis mondiale.',det:'Effetto: cerebrale profondo e meditativo, espansivo. Lunga durata fino a 4h. THC non altissimo ma qualitativo. La più storica delle sative da provare.'},

// ─── FRUITY SATIVAS ───────────────────────────────────────────────────────
{id:'tropicana-cookies',name:'Tropicana Cookies',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~22%',thcN:22,rd:9.1,aroma:'Mandarino, mango, passion fruit, pesca',desc:'Incrocio GSC e Tangie — profilo aromatico esplosivo. Boccioli arancio-dorati coperti di trichomi. Apri la bag e l\'agrume riempie la stanza.',det:'Effetto: uplifting immediato e potente, mood boost esplosivo, risate facili. Sativa dominante con body relax piacevole. Ottima per Vondelpark, mercati.'},
{id:'zkittlez',name:'Zkittlez',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['hybrid','fruity'],thc:'~20%',thcN:20,rd:8.9,aroma:'Uva, fragola, caramella, arcobaleno',desc:'Ibrida da Grape Ape e Grapefruit — più Cannabis Cup. Ogni tiro è un arcobaleno di sapori. Boccioli con sfumature viola e arancio spettacolari.',det:'Effetto: rilassante dolce senza sedazione. Mood elevato, mente svuotata appagante. Perfetta dopo cena lungo i canali. Ok anche per meno esperti.'},
{id:'mimosa',name:'Mimosa',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~22%',thcN:22,rd:8.8,aroma:'Arancia, limone, champagne, agrumi',desc:'Incrocio Clementine e Purple Punch. Profilo di prosecco fruttato — spumeggiante, agrumato, freschissimo. Molto ricercata nei coffeeshop premium.',det:'Effetto: luminoso, ottimista, migliora l\'umore rapidamente. Ideale come "colazione" mattutina — ti mette in moto. Ottima creatività.'},
{id:'tangie',name:'Tangie',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~19%',thcN:19,rd:8.7,aroma:'Mandarino puro, buccia agrume, dolce',desc:'Reinterpretazione moderna del California Orange anni \'90. Aroma di mandarino così intenso da sembrare artificiale — eppure è naturale al 100%.',det:'Effetto: sativa creativa — pensieri veloci, ispirazione, conversazioni. Ottima per gallerie, street art, mercatini. Non pesante né ansiogena.'},
{id:'orange-bud',name:'Orange Bud',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['hybrid','fruity','classic'],thc:'~17%',thcN:17,rd:8.4,aroma:'Arancio dolce, cedro, erbaceo',desc:'Varietà olandese classica Dutch Passion Seeds anni \'80. Quasi impossibile trovare fuori dall\'Olanda. Presenza fissa nei coffeeshop storici.',det:'Effetto: euforico e leggero, più gestibile delle haze. THC moderato — ideale pomeriggio. Ottima se vuoi restare funzionale mentre giri la città.'},
{id:'pineapple-express',name:'Pineapple Express',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['hybrid','fruity'],thc:'~19%',thcN:19,rd:8.5,aroma:'Ananas fresco, cedro, menta, fieno',desc:'Ibrida da Trainwreck e Hawaiian. Nei top shop l\'autentica è superiore ad ogni aspettativa. Boccioli densi con trichomi visibili.',det:'Effetto: mente sveglia e corpo rilassato in contemporanea — equilibrio perfetto. Lunga durata. Difficile sbagliare. Ottima per quasi ogni situazione.'},
{id:'papaya',name:'Papaya',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['indica','fruity'],thc:'~20%',thcN:20,rd:8.4,aroma:'Papaya matura, mango, spezie tropicali',desc:'Indica fruttata da Citral #13 e Ice #2. Foglie verde-viola, boccioli densi e resinosi. Meno conosciuta ma apprezzatissima dagli intenditori.',det:'Effetto: rilassante profondo con euforia iniziale dolce. Per la sera — divano col sorriso. Hunger intenso garantito. Scegli dove trovarti dopo.'},
{id:'strawberry-cough',name:'Strawberry Cough',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~18%',thcN:18,rd:8.6,aroma:'Fragola fresca, frutta rossa, dolce',desc:'Sativa dall\'aroma di fragola appena raccolta — inconfondibile. Kyle Kushman anni \'90. Il fumo espande i polmoni — da qui il nome.',det:'Effetto: uplifting sociale e paradossalmente anti-ansia. Ottima per situazioni sociali. Favorita nelle serate fuori.'},
{id:'lemon-haze',name:'Lemon Haze',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','haze','fruity'],thc:'~20%',thcN:20,rd:8.5,aroma:'Limone fresco, agrume, erbaceo',desc:'Sativa da Silver Haze e Lemon Skunk. L\'aroma di limone fresco è potente e immediato — invade la stanza appena apri il barattolo.',det:'Effetto: energizzante, uplifting cerebrale, ottimismo. Ottima per mattine, bici, mercatini del Waterlooplein. Tra le più amate dai turisti.'},
{id:'super-lemon-haze',name:'Super Lemon Haze',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','haze','fruity'],thc:'~20%',thcN:20,rd:8.7,aroma:'Limone candito, agrume dolce, floreale',desc:'Da Lemon Skunk e Super Silver Haze. Vince Cannabis Cup 2008 e 2009. Il Lemon Haze portato al livello successivo, profilo più complesso.',det:'Effetto: cerebrale luminoso e motivante, ottimismo, energia creativa. Un gradino sopra al normale Lemon Haze in tutto. Ottima mattina-pomeriggio.'},
{id:'chocolope',name:'Chocolope',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~21%',thcN:21,rd:8.6,aroma:'Cioccolato fondente, caffè, melone dolce',desc:'Sativa da Chocolate Thai e Cannalope Haze — DNA Genetics. Cioccolato e caffè in una sativa: combinazione rarissima e unica nel panorama.',det:'Effetto: cerebrale motivante, ottimismo espansivo, creatività attivata. Fumo dolce-amaro di lunga durata. Ricercata dagli intenditori per unicità.'},
{id:'mango-haze',name:'Mango Haze',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','haze','fruity'],thc:'~18%',thcN:18,rd:8.4,aroma:'Mango maturo, tropicale, haze speziato',desc:'Sativa da NL#5, Skunk e Haze. Aroma di mango tropicale che si combina con le note speziate della Haze. Molto apprezzata dagli intenditori.',det:'Effetto: uplifting cerebrale con corpo leggero e rilassato. Ottima per pomeriggi di esplorazione o serate sociali. Durata buona.'},
{id:'grapefruit',name:'Grapefruit',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~17%',thcN:17,rd:8.3,aroma:'Pompelmo fresco, agrume, erbaceo',desc:'Sativa da Cinderella 99. Aroma di pompelmo fresco caratteristico. Ceppo underrated amato dagli intenditori locali dei coffeeshop olandesi.',det:'Effetto: uplifting leggero e sostenuto, ottimismo senza ansia, conversazione facilitata. Ottima sativa fruttata con THC gestibile.'},
{id:'shiskaberry',name:'Shiskaberry',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['indica','fruity'],thc:'~18%',thcN:18,rd:8.3,aroma:'Frutti di bosco, mirtillo, dolce',desc:'Indica fruttata da Afghani e Blueberry. Profilo aromatico ricco di frutti di bosco. Visivamente bellissima con foglie viola e boccioli compatti.',det:'Effetto: rilassamento dolce con euforia iniziale piacevole. Ottima indica fruttata per serate tranquille. Alternativa più leggera alla Granddaddy Purple.'},
{id:'tangie-dream',name:'Tangerine Dream',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~21%',thcN:21,rd:8.6,aroma:'Mandarino dolcissimo, agrume tropicale, vaniglia',desc:'Ibrida Barney\'s Farm da G13 e Afghani — Cannabis Cup winner. Aroma di mandarino dolcissimo con punte vanigliose. Esclusiva di Barney\'s Farm.',det:'Effetto: euforia dolce e sostenuta, corpo leggermente rilassato. Ottima per chi ama la Tangie ma vuole un po\' più di corpo. Durata media.'},
{id:'cream-caramel',name:'Cream Caramel',cat:'Fruity Sativas',type:'weed',style:'ir-fruity',tags:['indica','fruity'],thc:'~20%',thcN:20,rd:8.4,aroma:'Caramello dolce, vaniglia, frutti esotici',desc:'Indica da BlueBlack, Maple Leaf Indica e White Rhino. Aroma dolcissimo di caramello e vaniglia. Cannabis Cup winner 2010.',det:'Effetto: corpo rilassato e caldo, euforia dolce iniziale. Perfetta sera e notte. Stone lungo e piacevole. Ottima indica fruttata con profilo aromatico memorabile.'},

// ─── POTENTI & PREMIATI ───────────────────────────────────────────────────
{id:'blue-dream',name:'Blue Dream',cat:'Potenti & Premiati',type:'weed',style:'ir-hybrid',tags:['hybrid','fruity'],thc:'~20%',thcN:20,rd:8.9,aroma:'Mirtilli, vaniglia, dolce floreale',desc:'Ibrida californiana da Blueberry e Haze. Il ceppo più venduto in California per anni. Combine il meglio di sativa e indica senza eccessi.',det:'Effetto: euforia dolce e accessibile, corpo rilassato, mente lucida. Porta d\'ingresso perfetta prima di varietà più potenti.'},
{id:'gelato',name:'Gelato',cat:'Potenti & Premiati',type:'weed',style:'ir-hybrid',tags:['hybrid'],thc:'~25%',thcN:25,rd:9.0,aroma:'Frutti di bosco, menta, cremoso, dolce',desc:'Ibrida da Sunset Sherbet e Thin Mint GSC. Alta potenza, profilo da dessert cremoso. Boccioli viola-arancio spettacolari.',det:'Effetto: colpo mentale intenso, poi corpo che si scioglie. Potente. Stone profondo fino a 4h. Se la trovi nei top shop, vale ogni euro.'},
{id:'gelato-41',name:'Gelato #41',cat:'Potenti & Premiati',type:'weed',style:'ir-potente',tags:['hybrid'],thc:'~26%',thcN:26,rd:9.1,aroma:'Gelato dolce, frutti di bosco, cremoso',desc:'Phenotype 41 — la più pregiata della Gelato. Boccioli lavanda e arancione, trichomi strabilianti. Considerata dalla community internazionale la Gelato definitiva.',det:'Effetto: rush mentale potente poi rilassamento fisico totale. Più intensa della Gelato standard. Se un coffeeshop ce l\'ha, è segnale di qualità altissima.'},
{id:'wedding-cake',name:'Wedding Cake',cat:'Potenti & Premiati',type:'weed',style:'ir-indica',tags:['indica'],thc:'~25%',thcN:25,rd:8.8,aroma:'Vaniglia, terra bagnata, pepe dolce',desc:'Indica dominante da Triangle Kush e Animal Mints. Tra i più potenti nei top shop. Aroma complesso di vaniglia, terra e spezie dolci.',det:'Effetto: stone fisico intenso, rilassamento muscolare profondo, mente sognante. Perfetta ultima serata del viaggio. Dura 3+h.'},
{id:'gorilla-glue',name:'Gorilla Glue #4',cat:'Potenti & Premiati',type:'weed',style:'ir-potente',tags:['hybrid'],thc:'~27%',thcN:27,rd:8.9,aroma:'Pino, diesel, cioccolato, terra',desc:'Ibrida da Chem\'s Sister, Sour Dubb e Chocolate Diesel. Tra i più resinosi e potenti mai creati. La resina incolla le dita alle forbici.',det:'Effetto: stone totale e immediato, corpo incollato al divano per ore. Non per chi non ha esperienza. Serata totalmente dedicata.'},
{id:'runtz',name:'Runtz',cat:'Potenti & Premiati',type:'weed',style:'ir-fruity',tags:['hybrid','fruity'],thc:'~24%',thcN:24,rd:9.0,aroma:'Caramella fruttata, uva, zucchero filato',desc:'Ibrida da Zkittlez e Gelato. Colori pazzeschi: viola, verde, arancio. Aromi di caramella fruttata intensissima. Difficile trovarne autentica.',det:'Effetto: euforia intensa seguita da rilassamento profondo — il meglio di sativa e indica in sequenza. Alta potenza. Se è in menu in un coffeeshop serio, compralo.'},
{id:'mac1',name:'MAC 1',cat:'Potenti & Premiati',type:'weed',style:'ir-hybrid',tags:['hybrid'],thc:'~23%',thcN:23,rd:9.2,aroma:'Floreale, speziato, cremoso, burro',desc:'Ibrida rara da Alien Cookies e Miracle 15. Richiede coltivatori esperti. Trichomi tra i più densi in assoluto. Aroma floreale-cremoso unico.',det:'Effetto: bilanciato perfetto — mente espansa e focalizzata, corpo rilassato. Se è in menu, è garanzia di qualità del coffeeshop.'},
{id:'granddaddy-purple',name:'Granddaddy Purple',cat:'Potenti & Premiati',type:'weed',style:'ir-indica',tags:['indica','fruity'],thc:'~20%',thcN:20,rd:8.8,aroma:'Uva nera, mirtilli, dolce, muschio',desc:'Indica californiana iconica da Purple Urkle e Big Bud. Colori viola intensissimi. Tra le più fotografate al mondo.',det:'Effetto: sedazione dolce progressiva, corpo pesante e caldo. Perfetta ultima notte del viaggio. Ottima per dormire.'},
{id:'cereal-milk',name:'Cereal Milk',cat:'Potenti & Premiati',type:'weed',style:'ir-fruity',tags:['hybrid','fruity'],thc:'~23%',thcN:23,rd:8.7,aroma:'Latte zuccherato, cereali, vaniglia, crema',desc:'Ibrida da Y Life e Snowman (Cookies Fam). Aroma di latte dei cereali la mattina. Sempre più presente in Europa.',det:'Effetto: elevazione mentale dolce e luminosa, corpo rilassato, umore alto. Perfetta mattina lenta al coffeeshop.'},

{id:'durban-poison',name:'Durban Poison',cat:'Potenti & Premiati',type:'weed',style:'ir-sativa',tags:['sativa','classic'],thc:'~20%',thcN:20,rd:8.9,aroma:'Anice, liquirizia dolce, pino, terroso',desc:'Sativa pura sudafricana — una delle poche landrace sativa autenticamente reperibili. Purezza genetica di decenni.',det:'Effetto: energizzante estremo e immediato — euphoria vivace, pensieri accelerati, focus acuto. Non provare a dormire dopo.'},
{id:'bubba-kush',name:'Bubba Kush',cat:'Potenti & Premiati',type:'weed',style:'ir-indica',tags:['indica','classic'],thc:'~22%',thcN:22,rd:8.7,aroma:'Caffè, cioccolato fondente, spezie, dolce',desc:'Indica quasi pura origini afghane. Old-school immortale — stone fisico totale. Aroma di caffè e cioccolato inconfondibile.',det:'Effetto: couch lock garantito e profondo, mente sognante. Non progettare nulla dopo. Ottima per dolori muscolari.'},

{id:'do-si-dos',name:'Do-Si-Dos',cat:'Potenti & Premiati',type:'weed',style:'ir-potente',tags:['indica'],thc:'~28%',thcN:28,rd:8.9,aroma:'Dolce floreale, menta, terra, calce',desc:'Indica dominante da GSC e Face Off OG. THC altissimo, aroma floreale-dolce con note di menta. Tra le indicate più potenti regolarmente disponibili.',det:'Effetto: stone fisico immediato e pesante, mente sognante e introspettiva. Per esperti alta tolleranza. Couch lock profondo. 4+h.'},
{id:'mimosa-evo',name:'Mimosa Evo',cat:'Potenti & Premiati',type:'weed',style:'ir-fruity',tags:['sativa','fruity'],thc:'~24%',thcN:24,rd:8.8,aroma:'Arancia sanguinella, fragola, champagne',desc:'Evoluzione della classica Mimosa — più potente e aromatica. Selezione phenotype superiore. Nei top shop come Boerejongens.',det:'Effetto: uplifting sativa esplosivo con corpo leggermente rilassato. Più intensa della Mimosa standard con durata maggiore.'},
{id:'black-widow',name:'Black Widow',cat:'Potenti & Premiati',type:'weed',style:'ir-sativa',tags:['sativa','classic'],thc:'~20%',thcN:20,rd:8.6,aroma:'Speziato, pino, cioccolato, dolce',desc:'Sativa da Mr. Nice Seeds (Shantibaba), cugina della White Widow. Cannabis Cup winner 1995. Spesso proposta come alternativa alla White.',det:'Effetto: cerebrale potente e creativo, espansivo. Euforia sostenuta. Ottima per chi vuole salire un gradino rispetto alla White Widow.'},
{id:'vanilla-kush',name:'Vanilla Kush',cat:'Potenti & Premiati',type:'weed',style:'ir-indica',tags:['indica'],thc:'~21%',thcN:21,rd:8.5,aroma:'Vaniglia, lavanda, dolce, speziato',desc:'Indica da Barney\'s Farm — Kashmir e Afghan genetics. Aroma di vaniglia e lavanda straordinariamente dolce. Cannabis Cup winner. Esclusiva Barney\'s.',det:'Effetto: rilassamento fisico profondo, euforia dolce, mente rilassata. Ottima per sera. Aroma dolce persistente nel fumo.'},
{id:'purple-haze',name:'Purple Haze',cat:'Potenti & Premiati',type:'weed',style:'ir-haze',tags:['sativa','haze'],thc:'~20%',thcN:20,rd:8.5,aroma:'Frutti di bosco, floreale, speziato, dolce',desc:'Sativa leggendaria resa immortale da Jimi Hendrix. Colori viola-blu magnifici. Effetto cerebrale caratteristico.',det:'Effetto: cerebrale espansivo e quasi psichedelico, ottimismo, senso di benessere. Ottima per esperienze sensoriali ed esplorazioni. Icona assoluta.'},
{id:'trainwreck',name:'Trainwreck',cat:'Potenti & Premiati',type:'weed',style:'ir-sativa',tags:['sativa','classic'],thc:'~21%',thcN:21,rd:8.6,aroma:'Pino, limone, mentolo, spezie',desc:'Sativa californiana da Mexican, Thai e Afghani. Effetto immediato e devastante — da cui il nome "treno deraglia". Cannabis Cup winner.',det:'Effetto: rush cerebrale immediato e potente, poi rilassamento fisico. Ottima combinazione per chi cerca sativa con corpo. Durata media-lunga.'},
{id:'super-skunk',name:'Super Skunk',cat:'Potenti & Premiati',type:'weed',style:'ir-hybrid',tags:['hybrid','classic'],thc:'~19%',thcN:19,rd:8.4,aroma:'Pungente intenso, terroso, dolce',desc:'Ibrida da Skunk #1 e Afghani. Cannabis Cup winner 1990. Più potente e aromatica dello Skunk #1. Coltivata in Olanda da 35 anni.',det:'Effetto: bilanciato e potente, euforia allegra poi rilassamento fisico. Ottima per chi ha amato lo Skunk #1 e vuole qualcosa in più.'},

{id:'h-softblack',name:'Soft Black Hash',cat:'Hash — Marocchino Classico',type:'hash',style:'ir-hash-mar',tags:['hash'],thc:'~40%',thcN:40,rd:7.8,aroma:'Speziato, morbido, dolciastro',desc:'Hash pressato morbido nord-africano. Il più trovabile nei coffeeshop. Cremoso, profumato, si lavora facilmente a temperatura ambiente.',det:'Effetto: bilanciato e piacevole, rilassante. Ottimo da mescolare in joint con erba. Il classico space cake di Amsterdam usa tipicamente questo.'},

{id:'h-king-hassan',name:'King Hassan',cat:'Hash — Marocchino Classico',type:'hash',style:'ir-hash-mar',tags:['hash'],thc:'~45%',thcN:45,rd:8.9,aroma:'Spezie reali, miele, tabacco dolce, legno',desc:'Hash marocchino di altissima qualità — nome storico nel mercato olandese. Prodotto con canapaio selezionato dalla regione di Hassan II. Colore marrone-ambrato.',det:'Effetto: cerebrale dolce con rilassamento fisico progressivo. Sapore complesso di spezie e miele. Spesso il migliore disponibile per qualità-prezzo nel Second Room.'},

{id:'h-charas',name:'Charas / Malana Cream',cat:'Hash — Orientale',type:'hash',style:'ir-hash-ori',tags:['hash'],thc:'~55%',thcN:55,rd:9.5,aroma:'Terroso profondo, cioccolato fondente, spezie indiane',desc:'Hash fatto a mano strofinando piante vive in India (Malana Valley, 2000m slm). Il Malana Cream è tra i migliori hash al mondo. Morbidissimo, nero fuori e verde scuro dentro.',det:'Effetto: indica pesante e avvolgente, stonatura profonda e corporea, mente sognante. Raramente autentico — chiedilo a Paradox, 1e Hulp o Dolores.'},

{id:'h-leb',name:'Lebanese Red Hash',cat:'Hash — Orientale',type:'hash',style:'ir-hash-ori',tags:['hash'],thc:'~45%',thcN:45,rd:8.6,aroma:'Erbaceo dolce, legno rosso, speziato',desc:'Red Lebanese Hash — prodotto in Libano con essiccazione al sole prolungata. Colore rosso-ambrato caratteristico per l\'ossidazione. Presenza storica nei coffeeshop olandesi.',det:'Effetto: uplifting cerebrale con corpo rilassato e caldo. Aroma di legno rosso e spezie dolci. Apprezzato dagli intenditori più anziani.'},

{id:'h-drysift',name:'Dry Sift Premium',cat:'Hash — Moderno Solventless',type:'hash',style:'ir-hash-mod',tags:['hash'],thc:'~65%',thcN:65,rd:9.1,aroma:'Varietale puro, pulito, speziato',desc:'Setacciatura a secco meccanica con micron multipli. Risultato quasi bianco e polveroso, altissima concentrazione di trichomi puri senza materia vegetale.',det:'Effetto: cerebrale potente e pulito, salita rapida. Ottimo aggiunto al joint di una sativa. Nei coffeeshop premium come "full melt" — si scioglie completamente.'},

/* ── ITEM ICON ── */
function itemIcon(item){
  var tags=item.tags||[],id=item.id||'',st=item.style||'';
  if(item.type==='hash'){
    if(st.includes('hash-mar'))return'\u{1F7E4}';
    if(st.includes('hash-ori'))return'\u{1F336}';
    if(st.includes('hash-mod'))return'\u{1F48E}';
    return'\u{1F7E4}';
  }
  if(st.includes('potente'))return'\u{1F480}';
  if(st.includes('haze'))return'\u26A1';
  if(st.includes('fruity')){
    if(id.includes('lemon'))return'\u{1F34B}';
    if(id.includes('orange')||id.includes('tangi')||id.includes('tropicana'))return'\u{1F34A}';
    if(id.includes('strawberry'))return'\u{1F353}';
    if(id.includes('mango'))return'\u{1F96D}';
    if(id.includes('pineapple'))return'\u{1F34D}';
    if(id.includes('mimosa'))return'\u{1F942}';
    if(id.includes('banana'))return'\u{1F34C}';
    if(id.includes('water')||id.includes('berry'))return'\u{1F347}';
    if(id.includes('runtz')||id.includes('zkittlez'))return'\u{1F308}';
    if(id.includes('cherry'))return'\u{1F352}';
    return'\u{1F351}';
  }
  if(tags.includes('indica'))return'\u{1F319}';
  if(tags.includes('sativa'))return'\u2600';
  if(tags.includes('hybrid'))return'\u262F';
  return'\u{1F33F}';
}

var LTAB='weed';
function setTypeTab(tab,btn){
  LTAB=tab;
  document.querySelectorAll('.tt').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  LF='all';

function updateChips(){
  var row=document.getElementById('lf-row');
  if(!row)return;
  if(LTAB==='weed'){
    row.innerHTML='<button class="fc on" onclick="setLF(this,\'all\')">Tutto</button>'
      +'<button class="fc" onclick="setLF(this,\'sativa\')">Sativa</button>'
      +'<button class="fc" onclick="setLF(this,\'indica\')">Indica</button>'
      +'<button class="fc" onclick="setLF(this,\'hybrid\')">Hybrid</button>'
      +'<button class="fc" onclick="setLF(this,\'fruity\')">Fruity</button>'
      +'<button class="fc" onclick="setLF(this,\'haze\')">Haze</button>'
      +'<button class="fc" onclick="setLF(this,\'classic\')">Classic</button>'
      +'<button class="fc on-p" onclick="setLF(this,\'potente\')">\u{1F480} Potenti</button>'
      +'<button class="fc on-a" onclick="setLF(this,\'strd\')">\u2605 Wish</button>';
  } else {
    row.innerHTML='<button class="fc on" onclick="setLF(this,\'all\')">Tutto</button>'
      +'<button class="fc on-b" onclick="setLF(this,\'hash-mar\')">\u{1F7E4} Marocchino</button>'

      +'<button class="fc on-a" onclick="setLF(this,\'strd\')">\u2605 Wish</button>';
  }
}

/* ── QUICK STAR erba ── */
function quickStar(id){
  var s=gs(id);s.starred=!s.starred;ss(id,s);
  var btn=document.getElementById('star-'+id);
  if(btn){btn.textContent=s.starred?'\u2605':'\u2606';btn.classList.toggle('on',!!s.starred);}
  var row=document.getElementById('row-'+id);
  if(row)row.classList.toggle('strd',!!s.starred);
  updateStats();
}

/* ── QUICK STAR shop ── */
function quickShopStar(id){
  var s=gs('sh_'+id);s.starred=!s.starred;ss('sh_'+id,s);
  var btn=document.getElementById('shstar-'+id);
  if(btn){btn.textContent=s.starred?'\u2605':'\u2606';btn.classList.toggle('on',!!s.starred);}
  var wsh=document.getElementById('w-sh');
  if(wsh)wsh.textContent=SHOPS.filter(function(x){return !!gs('sh_'+x.id).starred;}).length;
}

function setLF(btn,val){
  LF=val;
  document.querySelectorAll('#lf-row .fc').forEach(c=>c.classList.remove('on','on-a','on-b','on-p'));
  btn.classList.add(val==='hash'?'on-b':val==='strd'||val==='done'?'on-a':val==='potente'?'on-p':'on');
  document.getElementById('list-q').value='';
  document.getElementById('list-clr').style.display='none';
  renderList();
}
function setSF(btn,val){
  SF=val;
  document.querySelectorAll('#sf-row .fc').forEach(c=>c.classList.remove('on','on-a','on-b','on-p'));
  btn.classList.add(val==='rated'?'on-a':val==='hash'?'on-b':'on');
  document.getElementById('shop-q').value='';
  renderShops();
}
function setWT(btn,val){
  WT=val;
  document.querySelectorAll('#wish-tabs .wtab').forEach(b=>b.classList.remove('wt-g','wt-b','wt-bl'));
  btn.classList.add(val==='hash'?'wt-b':val==='shop'?'wt-bl':'wt-g');
  renderWish();
}
function onSrch(v){document.getElementById('list-clr').style.display=v?'inline':'none';renderList();}
function clrSrch(){document.getElementById('list-q').value='';document.getElementById('list-clr').style.display='none';renderList();}

function renderList(){
  const q=(document.getElementById('list-q').value||'').toLowerCase().trim();
  const thcMin=parseInt(document.getElementById('thc-sl').value)||0;
  const body=document.getElementById('list-body');
  body.innerHTML='';
  let shown=0;
  CATS.forEach(cat=>{
    const items=cat.ids.map(id=>ALL.find(i=>i.id===id)).filter(Boolean);
    const rows=[];
    items.forEach(item=>{
      const s=gs(item.id);
      const isHash=item.type==='hash';
      const checked=isHash?!!s.hdone:!!s.checked;
      if(typeof LTAB!=='undefined'&&LTAB==='weed'&&item.type==='hash')return;
      if(typeof LTAB!=='undefined'&&LTAB==='hash'&&item.type!=='hash')return;
      const starred=!!s.starred;
      const tags=item.tags||[];
      // filter
      let show=true;
      if(q){show=item.name.toLowerCase().includes(q)||(item.aroma||'').toLowerCase().includes(q)||tags.join(' ').toLowerCase().includes(q)||(item.desc||'').toLowerCase().includes(q);}
      else if(LF==='sativa')show=tags.includes('sativa');
      else if(LF==='indica')show=tags.includes('indica');
      else if(LF==='hybrid')show=tags.includes('hybrid');
      else if(LF==='fruity')show=tags.includes('fruity');
      else if(LF==='haze')show=tags.includes('haze');
      else if(LF==='classic')show=tags.includes('classic');
      else if(LF==='hash')show=isHash;
      else if(LF==='hash-mar')show=(item.style||'').includes('hash-mar');
      else if(LF==='hash-ori')show=(item.style||'').includes('hash-ori');
      else if(LF==='hash-mod')show=(item.style||'').includes('hash-mod');
      else if(LF==='potente')show=(item.thcN||0)>=25;
      else if(LF==='strd')show=starred;
      else if(LF==='done')show=checked;
      if(!isHash&&thcMin>0&&(item.thcN||0)<thcMin)show=false;
      if(!show)return;
      const dr=getR(item);
      const tagHtml=tags.slice(0,2).map(t=>`<span class="itag ${TC[t]||'tc'}">${TN[t]||t}</span>`).join('');
      const style=item.style||'ir-default';
      const rowCls=`ir ${style}`+(checked?(isHash?' hdone':' done'):'')+(starred?' strd':'');
      const wrap=document.createElement('div');
      const ico=itemIcon(item);
      wrap.innerHTML=`<div class="${rowCls}" id="row-${item.id}" data-ico="${ico}">
        <div class="cc">${ico}</div>
        <span class="inm">${item.name}</span>
        <div class="itags">${tagHtml}</div>
        <div class="irt"><span class="ithc">${item.thc}</span><span class="irat" style="color:${rc(dr)}">${parseFloat(dr).toFixed(1)}</span></div>
        <button class="${starred?'istar on':'istar'}" id="star-${item.id}" onclick="event.stopPropagation();quickStar('${item.id}')">${starred?'★':'☆'}</button>
      </div>`;
      const rowEl=wrap.firstElementChild;
      let pt;
      rowEl.addEventListener('pointerdown',()=>{pt=setTimeout(()=>quickChk(item.id,isHash),500);},{passive:true});
      rowEl.addEventListener('pointerup',()=>clearTimeout(pt));
      rowEl.addEventListener('pointercancel',()=>clearTimeout(pt));
      rowEl.addEventListener('click',()=>{clearTimeout(pt);openItemPop(item.id);});
      rows.push(wrap);
    });
    if(rows.length){
      const sec=document.createElement('div');sec.className='sec';
      sec.innerHTML=`<div class="slbl">${cat.lbl}<span class="slbl-c">(${rows.length})</span></div>`;
      rows.forEach(r=>sec.appendChild(r));
      body.appendChild(sec);
      shown+=rows.length;
    }
  });
  document.getElementById('list-nores').style.display=shown?'none':'block';
  updateStats();updateRatio();
}

/* ══════════════════════════════════
   QUICK CHECK (long press)
══════════════════════════════════ */
function quickChk(id,isHash){
  const s=gs(id);if(isHash)s.hdone=!s.hdone;else s.checked=!s.checked;ss(id,s);
  const row=document.getElementById('row-'+id);
  if(row){
    if(isHash)row.classList.toggle('hdone',!!s.hdone);
    else{row.classList.toggle('done',!!s.checked);}
  }
  updateStats();updateRatio();
}

/* ══════════════════════════════════
   STATS + RATIO
══════════════════════════════════ */
function updateStats(){
  let tot=0,wish=0;
  ALL.forEach(i=>{tot++;if(gs(i.id).starred)wish++;});
  V('s-tot',tot);V('s-wish',wish);
}
function updateRatio(){
  const w=ALL.filter(i=>i.type==='weed'),t=w.length||1;
  const sat=w.filter(i=>(i.tags||[]).includes('sativa')).length;
  const ind=w.filter(i=>(i.tags||[]).includes('indica')).length;
  const hyb=w.filter(i=>(i.tags||[]).includes('hybrid')).length;
  const sp=sat/t*100,hp=hyb/t*100,ip=ind/t*100;
  document.getElementById('rb-s').style.width=sp+'%';
  document.getElementById('rb-h').style.width=hp+'%';
  V('rl-s','SAT '+Math.round(sp)+'%');
  V('rl-h','HYB '+Math.round(hp)+'%');
  V('rl-i','IND '+Math.round(ip)+'%');
}

function renderWish(){
  const body=document.getElementById('wish-body');
  body.innerHTML='';
  const allStarred=ALL.filter(i=>gs(i.id).starred);
  const shopStarred=SHOPS.filter(s=>gs('sh_'+s.id).starred);
  // update tab counts
  const weed=allStarred.filter(i=>i.type==='weed');
  const hash=allStarred.filter(i=>i.type==='hash');
  const btns=document.querySelectorAll('#wish-tabs .wtab');
  if(btns[0])btns[0].textContent=`🌿 Erbe (${weed.length})`;
  if(btns[1])btns[1].textContent=`🍫 Hash (${hash.length})`;
  if(btns[2])btns[2].textContent=`☕ Shop (${shopStarred.length})`;
  // update counters
  let fnd=0;
  allStarred.forEach(i=>{const s=gs(i.id);if(s.checked||s.hdone)fnd++;});
  shopStarred.forEach(s=>{if(gs('sh_'+s.id).visited)fnd++;});
  V('w-tot',allStarred.length+shopStarred.length);
  V('w-fnd',fnd);
  V('w-sh',shopStarred.length);

  if(WT==='weed'){renderWishItems(body,weed);}
  else if(WT==='hash'){renderWishItems(body,hash);}
  else{renderWishShops(body,shopStarred);}
}

function renderWishItems(body,items){
  if(!items.length){body.innerHTML='<div class="empty-st">Nessuna voce in wishlist<br>Aggiungi ★ dal popup nella scheda Lista</div>';return;}
  const grouped={};
  items.forEach(item=>{if(!grouped[item.cat])grouped[item.cat]=[];grouped[item.cat].push(item);});
  Object.entries(grouped).forEach(([catName,citems])=>{
    const sec=document.createElement('div');sec.className='sec';
    sec.innerHTML=`<div class="slbl">${catName}</div>`;
    citems.forEach(item=>{
      const s=gs(item.id);
      const isHash=item.type==='hash';
      const checked=isHash?!!s.hdone:!!s.checked;
      const dr=getR(item);
      const tags=item.tags||[];
      const wtype=item.style||'ir-default';
      const tagHtml=tags.slice(0,2).map(t=>`<span class="itag ${TC[t]||'tc'}" style="font-size:7px">${TN[t]||t}</span>`).join('');
      const wrap=document.createElement('div');
      const wico=itemIcon(item);
      wrap.innerHTML=`<div class="wcard wcs ${wtype}${checked?' wcard-done':''}" id="wc-${item.id}" data-ico="${wico}">
        <div class="wcard-inner">
          <div class="wcard-main" id="wcm-${item.id}">
            <div style="min-width:0">
              <div style="display:flex;align-items:center;gap:5px"><span style="font-size:13px">${wico}</span><div class="wcard-nm">${item.name}</div></div>
              <div class="wcard-sub">${item.thc} · ${item.aroma}</div>

            <span style="font-size:9px;color:var(--m2)">›</span>

      wrap.querySelector('#wcm-'+item.id).addEventListener('click',()=>openItemPop(item.id));
      sec.appendChild(wrap);
    });
    body.appendChild(sec);
  });
}

function renderWishShops(body,shops){
  if(!shops.length){body.innerHTML='<div class="empty-st">Nessun coffeeshop in wishlist<br>Aggiungi ★ dal popup nella scheda Shops</div>';return;}

      <div class="wcard-inner">

function removeWishItem(id){
  const s=gs(id);s.starred=false;ss(id,s);

  if(rowEl)rowEl.classList.remove('strd');

function removeWishShop(id){
  const s=gs('sh_'+id);s.starred=false;ss('sh_'+id,s);

  if(lb){lb.textContent='☆';lb.classList.remove('on');}

      <span style="font-family:'DM Mono',monospace;font-size:7.5px;color:var(--m2)">0</span>
      <input type="range" class="${rcls}" id="pop-ri" min="0" max="10" step="0.01" value="${rval}">
      <span style="font-family:'DM Mono',monospace;font-size:7.5px;color:var(--m2)">10</span>
      <span class="rv ${rvcls}" id="pop-rv">${parseFloat(rval).toFixed(2)}</span>
    </div>
    <div class="pdiv"></div>
    <div class="plbl">grammi acquistati</div>
    <div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.38rem">
      <input class="grams-inp" type="number" style="color:${gcol}" min="0" max="20" step="0.5" placeholder="0" value="${s.grams||''}" id="pop-gr">

    </div>
    <div class="plbl">note personali</div>
    <textarea class="ni" rows="2" placeholder="coffeeshop, impressioni, quando, con chi..." id="pop-note">${s.note||''}</textarea>
    <div class="pacts">
      <button class="pa ${checked?(isHash?'pb':'pg'):''}" id="pop-chk" onclick="toggleChkPop('${id}',${isHash})">
        ${checked?(isHash?'✓ Provato':'✓ Trovata'):(isHash?'Segna provato':'Segna trovata')}
      </button>
      ${!isHash?`<button class="pa ${starred?'pa2':''}" id="pop-star" onclick="toggleStarPop('${id}')">
        ${starred?'★ In wishlist':'☆ Wishlist'}

        ${starred?'★ In wishlist':'☆ Wishlist'}
      </button>`}

function updR(id,v){
  ['row-','wc-'].forEach(pfx=>{const el=document.getElementById(pfx+id);if(el){const b=el.querySelector('.irat,.wcard-r');if(b){b.textContent=parseFloat(v).toFixed(1);b.style.color=rc(v);}}});
  const rlpv=document.querySelector('#pop-cnt .rlp-v');
  if(rlpv){rlpv.style.color=rc(v);rlpv.textContent=parseFloat(v).toFixed(1)+'/10';}
  const bar=document.querySelector('#pop-cnt .pop-bar-fill');
  if(bar){bar.style.width=(v/10*100).toFixed(1)+'%';bar.style.background=rc(v);}
}
function toggleChkPop(id,isHash){
  const s=gs(id);if(isHash)s.hdone=!s.hdone;else s.checked=!s.checked;ss(id,s);
  const chk=isHash?s.hdone:s.checked;
  const btn=document.getElementById('pop-chk');
  if(btn){btn.textContent=chk?(isHash?'✓ Provato':'✓ Trovata'):(isHash?'Segna provato':'Segna trovata');btn.className='pa '+(chk?(isHash?'pb':'pg'):'');}
  const row=document.getElementById('row-'+id);
  if(row){if(isHash)row.classList.toggle('hdone',!!s.hdone);else row.classList.toggle('done',!!s.checked);}
  updateStats();updateRatio();
}
function toggleStarPop(id){
  const s=gs(id);s.starred=!s.starred;ss(id,s);
  const btn=document.getElementById('pop-star');
  if(btn){btn.textContent=s.starred?'★ In wishlist':'☆ Wishlist';btn.className='pa '+(s.starred?'pa2':'');}
  const row=document.getElementById('row-'+id);
  if(row)row.classList.toggle('strd',!!s.starred);
  const sb=document.getElementById('star-'+id);
  if(sb){sb.textContent=s.starred?'★':'☆';sb.classList.toggle('on',!!s.starred);}
  updateStats();
}

      <span style="font-family:'DM Mono',monospace;font-size:7.5px;color:var(--m2)">0</span>
      <input type="range" class="sh-rsl" id="sh-ri" min="0" max="10" step="0.01" value="${r}">
      <span style="font-family:'DM Mono',monospace;font-size:7.5px;color:var(--m2)">10</span>
      <span class="sh-rv" id="sh-rv">${r.toFixed(2)}</span>
    </div>
    <div class="pdiv"></div>
    <div class="plbl">note personali</div>
    <textarea class="ni" rows="2" placeholder="cosa hai provato, impressioni, ci torni?" id="sh-note">${s.note||''}</textarea>
    <div class="pacts" style="margin-bottom:.3rem">
      <button class="pa ${starred?'pa2':''}" id="sh-star" onclick="toggleShopStar('${id}')">
        ${starred?'★ In wishlist':'☆ Wishlist shop'}
      </button>
      <button class="pa ${visited?'pbl':''}" id="sh-vis" onclick="toggleShopVisited('${id}')">
        ${visited?'✓ Visitato':'Segna visitato'}
      </button>
      ${starred?`<button class="pa pr" onclick="removeWishShop('${id}');closeOv()">✕ Rimuovi wish</button>`:''}
    </div>
    <a class="map-btn" href="${shop.map}" target="_blank">↗ Apri in Google Maps</a>
    <button class="srch-btn" onclick="openG('${shop.name} coffeeshop Amsterdam recensioni')">🔍 Cerca su Google</button>
    <button class="srch-btn" onclick="openG('${shop.name} coffeeshop Amsterdam menu weed 2025')">🌿 Cerca menu online</button>
    <button class="srch-btn" onclick="openG('${shop.name} Amsterdam tripadvisor')">⭐ Vedi su TripAdvisor</button>
  `;
  document.getElementById('sh-ri').addEventListener('input',function(){
    const v=parseFloat(this.value);
    document.getElementById('sh-rv').textContent=v.toFixed(2);
    const shrlpv=document.querySelector('#pop-cnt .rlp-v');if(shrlpv){shrlpv.style.color=rc(v);shrlpv.textContent=v.toFixed(1)+'/10';}
    const shbar=document.getElementById('sh-bar');if(shbar){shbar.style.width=(v/10*100).toFixed(1)+'%';shbar.style.background=rc(v);}
    shfld(id,'rating',v);renderShops();
  });
  document.getElementById('sh-note').addEventListener('input',e=>shfld(id,'note',e.target.value));
  showOv();
}

function toggleShopStar(id){
  const s=gs('sh_'+id);s.starred=!s.starred;ss('sh_'+id,s);
  const btn=document.getElementById('sh-star');
  if(btn){btn.textContent=s.starred?'★ In wishlist':'☆ Wishlist shop';btn.className='pa '+(s.starred?'pa2':'');}
  const lb=document.getElementById('shstar-'+id);
  if(lb){lb.textContent=s.starred?'★':'☆';lb.classList.toggle('on',!!s.starred);}
}
function toggleShopVisited(id){
  const s=gs('sh_'+id);s.visited=!s.visited;ss('sh_'+id,s);
  const btn=document.getElementById('sh-vis');
  if(btn){btn.textContent=s.visited?'✓ Visitato':'Segna visitato';btn.className='pa '+(s.visited?'pbl':'');}
  const card=document.getElementById('shcard-'+id);
  if(card)card.classList.toggle('sc-visited',!!s.visited);
  const wc=document.getElementById('wc-sh-'+id);
  if(wc)wc.classList.toggle('wcard-done',!!s.visited);
}
function shfld(id,f,v){const s=gs('sh_'+id);s[f]=v;ss('sh_'+id,s);}
function openG(q){window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');}

/* ══════════════════════════════════
   OVERLAY
══════════════════════════════════ */
function showOv(){document.getElementById('ov').classList.add('show');}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function maybeClose(e){if(e.target===document.getElementById('ov'))closeOv();}


/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
document.addEventListener('DOMContentLoaded',function(){
  updateChips();renderList();renderShops();updateStats();updateRatio();
});

// swipe down to close popup
document.addEventListener('DOMContentLoaded',function(){
  var popEl=document.getElementById('pop');
  if(!popEl)return;
  var ty=0;
  popEl.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;},{passive:true});
  popEl.addEventListener('touchmove',function(e){
    if(e.touches[0].clientY-ty>70&&popEl.scrollTop===0)closeOv();
  },{passive:true});
});

</script>

<script>
(function(){
  var dp=null;
  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault();dp=e;
    if(localStorage.getItem("pwa-ok"))return;
    var d=document.createElement("div");d.id="pwa-b";
    d.style.cssText="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:456px;z-index:9999;background:#0e1a0a;border:1px solid #4eff38;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.8)";
    d.innerHTML="<span style='font-size:22px'>&#127807;</span><div style='flex:1'><div style='font-family:Chakra Petch,sans-serif;font-size:13px;font-weight:700;color:#4eff38'>Installa AMS Green Guide</div><div style='font-family:Kanit,sans-serif;font-size:12px;color:#b0aca4'>Aggiungi alla schermata Home</div></div><button id='pwa-inst' style='background:#4eff38;color:#070707;border:none;border-radius:8px;padding:6px 11px;font-family:Kanit,sans-serif;font-size:12px;font-weight:600;cursor:pointer'>Installa</button><button id='pwa-dis' style='background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 4px'>&#215;</button>";
    document.body.appendChild(d);
    document.getElementById("pwa-inst").onclick=function(){if(!dp)return;dp.prompt();dp.userChoice.then(function(r){if(r.outcome==="accepted")localStorage.setItem("pwa-ok","1");var b=document.getElementById("pwa-b");if(b)b.remove();dp=null;});};
    document.getElementById("pwa-dis").onclick=function(){var b=document.getElementById("pwa-b");if(b)b.remove();};
  });
  window.addEventListener("appinstalled",function(){localStorage.setItem("pwa-ok","1");var b=document.getElementById("pwa-b");if(b)b.remove();});
})();
</script>
</body>
</html>
